# Railway config for CAMS Frontend (Next.js)
# Optional: use this if you deploy the frontend on Railway. Set this service's Root Directory to "frontend" in Railway Dashboard.
# For Vercel deployment, use frontend/vercel.json and set env vars in Vercel Dashboard.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["package.json", "package-lock.json", "src/**", "next.config.js", "tailwind.config.js", "railway.toml"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ALWAYS"
